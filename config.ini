# Xenium Analysis Pipeline Configuration
# Copy this file and customize for your project

[general]
project_name = xenium_pancreas_2026
tissue_type = pancreas
organism = human

[paths]
data_dir = data/raw
output_dir = data/processed
figures_dir = figures
phenocycler_dir = data/phenocycler

[samples]
# List your sample names (without file extensions)
sample_list = 0041323,0041326

[preprocessing]
# Quality control thresholds (aligned with 10x Xenium 5k tutorial, 2026)
# Note: the live thresholds are read from the XENIUM_* env vars in
# notebooks/01_preprocessing_v2.ipynb (cell 3). This section is reference only.
min_genes_per_cell = 20
min_cells_per_gene = 100
min_counts_per_cell = 50
max_counts_quantile = 0.98

# Normalization (default target_sum = median count; 10x recipe)
target_sum = default
n_top_genes = 2000   # HVG is metadata-only; PCA uses all panel genes

# Dimensionality reduction
n_pcs = 30
n_neighbors = 15
umap_min_dist = 0.5
umap_metric = cosine
random_state = 0

[clustering]
# Clustering resolutions to try
resolutions = 0.5,1.0,1.5

[phenotyping]
# Panel-aware pancreas marker dict for the T1D-focused hAtlas_v1.1+100 panel.
# Canonical hormones (INS, GCG, SST, PPY, TTR, IRX2) and most acinar zymogens
# (PRSS1/2, CPA1/2, CTRB1/2, CELA1/2A/3A, REG1A/3A) are NOT on this panel.
# The authoritative dict lives in notebooks/02_phenotyping.ipynb cell 10;
# this section is a reference mirror only.
# Alpha/Delta/Epsilon/Acinar are treated as LOW confidence due to thin
# panel coverage — assignments are post-filtered to Indeterminate when
# celltype_confidence < median - 1*MAD.

Beta = IAPP,MAFA,NKX6-1,PDX1,SLC30A8,ABCC8,KCNJ11,GLP1R,PCSK1
Alpha = ARX,MAFB
Delta = HHEX,LEPR
Epsilon = GHRL
Endocrine = CHGA,INSM1,ISL1,NEUROD1,FEV,PAX6,SCG5
Acinar = AMY1A
Ductal = KRT19,SOX9,HNF1B,MUC1,CFTR
Stellate = ACTA2,PDGFRB,RGS5,PDGFRA
Endothelial = PECAM1,CDH5,CLDN5,PLVAP,KDR,ENG
T_cells = CD3D,CD3E,CD3G,CD8A,CD8B,CD4,PTPRC,FOXP3
B_cells = MS4A1,CD79A,CD79B,CD19
Myeloid = CD68,CD163,CSF1R,MARCO,CD14
Schwann = MPZ,SOX10,NES
Proliferating = MKI67,TOP2A,PCNA

[spatial]
# Spatial analysis parameters
n_spatial_neighbors = 10
spatial_max_dist = 500

# Co-occurrence analysis
n_permutations = 1000

[differential_expression]
# DE testing parameters
test_method = wilcoxon  # or t-test, logreg
logfc_threshold = 0.25
min_pct = 0.1
pval_threshold = 0.05

[integration]
# Batch correction parameters
batch_key = sample_batch
n_latent = 30
n_layers = 2
max_epochs = 200

[hipergator]
# HiPerGator SLURM settings
email = smith6jt@ufl.edu
qos = maigan
account = maigan

# Resource allocation
preprocess_cpus = 8
preprocess_mem = 64gb
preprocess_time = 24:00:00

phenotype_cpus = 8
phenotype_mem = 64gb
phenotype_time = 24:00:00

spatial_cpus = 16
spatial_mem = 128gb
spatial_time = 48:00:00

pipeline_cpus = 16
pipeline_mem = 128gb
pipeline_time = 96:00:00

[visualization]
# Plotting parameters
dpi = 300
figure_format = png  # or pdf, svg
colormap = viridis
