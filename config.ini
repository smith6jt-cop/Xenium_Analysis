# Xenium Analysis Pipeline Configuration
# Copy this file and customize for your project

[general]
project_name = my_xenium_project
tissue_type = liver  # or kidney, brain, tumor, etc.
organism = human  # or mouse

[paths]
data_dir = data/raw
output_dir = data/processed
figures_dir = figures
phenocycler_dir = data/phenocycler

[samples]
# List your sample names (without file extensions)
sample_list = xenium_sample_01,xenium_sample_02,xenium_sample_03

[preprocessing]
# Quality control thresholds
min_genes_per_cell = 10
min_cells_per_gene = 3
max_mt_percent = 20
min_counts_per_cell = 50

# Normalization
target_sum = 10000
n_top_genes = 2000

# Dimensionality reduction
n_pcs = 50
n_neighbors = 15
umap_min_dist = 0.5

[clustering]
# Clustering resolutions to try
resolutions = 0.5,1.0,1.5

[phenotyping]
# Cell type marker genes (customize for your tissue)
# Format: CellType = GENE1,GENE2,GENE3

T_cells = CD3D,CD3E,CD3G,CD8A,CD4
B_cells = CD19,CD79A,CD79B,MS4A1
NK_cells = NKG7,GNLY,NCAM1
Myeloid = CD14,CD68,LYZ,CSF1R
Macrophages = CD68,CD163,MSR1
Dendritic_cells = CD1C,FCER1A,CLEC9A
Neutrophils = FCGR3B,CSF3R,S100A8,S100A9
Epithelial = EPCAM,KRT8,KRT18,KRT19
Endothelial = PECAM1,VWF,CDH5,ENG
Fibroblasts = COL1A1,COL1A2,DCN,LUM
Smooth_muscle = ACTA2,MYH11,TAGLN
Proliferating = MKI67,TOP2A,PCNA

[spatial]
# Spatial analysis parameters
n_spatial_neighbors = 10
spatial_max_dist = 500

# Co-occurrence analysis
n_permutations = 1000

[differential_expression]
# DE testing parameters
test_method = wilcoxon  # or t-test, logreg
logfc_threshold = 0.25
min_pct = 0.1
pval_threshold = 0.05

[integration]
# Batch correction parameters
batch_key = sample_batch
n_latent = 30
n_layers = 2
max_epochs = 200

[hipergator]
# HiPerGator SLURM settings
email = your_email@ufl.edu
qos = your_qos
account = your_account

# Resource allocation
preprocess_cpus = 8
preprocess_mem = 64gb
preprocess_time = 24:00:00

phenotype_cpus = 8
phenotype_mem = 64gb
phenotype_time = 24:00:00

spatial_cpus = 16
spatial_mem = 128gb
spatial_time = 48:00:00

pipeline_cpus = 16
pipeline_mem = 128gb
pipeline_time = 96:00:00

[visualization]
# Plotting parameters
dpi = 300
figure_format = png  # or pdf, svg
colormap = viridis
