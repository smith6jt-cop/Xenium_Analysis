name: xenium_analysis
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Python
  - python=3.12
  
  # Core scientific computing
  - numpy
  - pandas
  - scipy
  - scikit-learn
  
  # Single-cell analysis
  - scanpy
  - squidpy
  - anndata
  - scvi-tools[all]
  
  # Visualization
  - matplotlib
  - seaborn
  - plotly
  - napari
  
  # Spatial analysis
  - shapely
  - spatialdata
  
  # Image processing
  - scikit-image
  - opencv
  - tifffile
  
  # R integration
  - rpy2
  - r-base
  - r-seurat
  - r-ggplot2
  - r-dplyr
  - r-tidyr
  - r-patchwork
  
  # Jupyter and notebook tools
  - jupyter
  - jupyterlab
  - ipykernel
  - ipywidgets
  - nb_conda_kernels
  
  # File I/O
  - h5py
  - zarr
  - leidenalg
  
  # Utilities
  - tqdm
  - joblib
  - openpyxl
  
  # Statistical testing
  - statsmodels
  - pingouin
  
  # pip packages (not available in conda)
  - pip
  - pip:
    - scrublet
    - harmonypy
    - cell2location
    - spatialdata-io
    - spatialdata-plot
    - pygam
